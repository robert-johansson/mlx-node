name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # `labeled` lets a PR opt into the heavy model-test leg by carrying the
    # `model-e2e` label; an unrelated label add no-ops (every job gates off
    # github.event.label.name below). GitHub can't filter label events by name
    # at the trigger level.
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 1

jobs:
  build:
    name: Build
    # Build on every push / PR sync / reopen / dispatch. Skip only label events
    # that aren't adding `model-e2e` (keyed on github.event.label.name — the
    # label that fired THIS event — so unrelated label churn on an already-labeled
    # PR does NOT rebuild). When the `model-e2e` label DOES fire this run, the
    # "Reuse existing build" step below pulls the head SHA's already-uploaded
    # artifacts instead of recompiling, and model-test reuses them via needs.
    if: >-
      github.event.action != 'labeled' ||
      github.event.label.name == 'model-e2e'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin
          cache: false
          rustflags: ''

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          # Don't cache ~/.cargo/bin — restoring it overwrites the
          # rustup proxy installed by setup-rust-toolchain and leaves
          # cargo resolving to rustup-init's usage screen.
          cache-bin: false
          # Bumped after switching toolchain action; forces fresh
          # caches and orphans the poisoned v0-rust archives.
          prefix-key: v1-rust

      - name: Configure GitHub token for CMake downloads
        run: |
          echo "machine github.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          echo "machine objects.githubusercontent.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          chmod 600 ~/.netrc

      - name: Install dependencies
        run: yarn install --immutable

      # On a `model-e2e` label opt-in the head SHA was already built by its
      # push/sync CI run — download those artifacts instead of spending ~16 min
      # recompiling. Runs ONLY on label events (never on push/sync, so normal CI
      # always builds natively). One artifact per `gh run download` call: a single
      # -n extracts flat into -D, but multiple -n names each nest into their own
      # subdir. Falls through to a native build if no prior success exists yet.
      - name: Reuse existing build on model-e2e opt-in (no native rebuild)
        id: reuse
        if: github.event.action == 'labeled'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass through env (not inline ${{ }}) — branch names are untrusted.
          SHA: ${{ github.event.pull_request.head.sha }}
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          run_id="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow ci.yml \
            --branch "$BRANCH" --limit 40 \
            --json databaseId,headSha,conclusion \
            --jq "[.[] | select(.headSha == \"$SHA\" and .conclusion == \"success\")][0].databaseId")"
          # The downloads sit INSIDE the `if` condition so a missing / expired /
          # partial artifact does NOT abort under `set -e` — it falls through to the
          # native build below instead of failing the run (a partial mlx-node left
          # in packages/core/ is harmless: `yarn build` regenerates it).
          if [ -n "${run_id:-}" ] && [ "$run_id" != "null" ] \
            && gh run download "$run_id" --repo "$GITHUB_REPOSITORY" -n mlx-node -D packages/core/ \
            && gh run download "$run_id" --repo "$GITHUB_REPOSITORY" -n mlx-metallib -D packages/core/; then
            echo "Reused native artifacts from CI run $run_id for $SHA (no rebuild)"
            echo "reused=true" >> "$GITHUB_OUTPUT"
          else
            echo "No reusable build for $SHA; building natively."
          fi

      - name: Build native module
        if: steps.reuse.outputs.reused != 'true'
        run: yarn build
        env:
          CARGO_INCREMENTAL: 1

      - uses: actions/upload-artifact@v6
        with:
          name: mlx-node
          path: packages/core/*.node
      # Both metallibs ship as part of the darwin-arm64 optional
      # package: `mlx.metallib` for stock MLX kernels and
      # `paged_attn.metallib` for the paged-attention compile path
      # (loaded via dladdr-relative lookup at runtime). The publish
      # job downloads this artifact INTO
      # `packages/core/npm/darwin-arm64/` so both files have to be
      # in the same artifact to land alongside the .node addon.
      - uses: actions/upload-artifact@v6
        with:
          name: mlx-metallib
          path: |
            packages/core/mlx.metallib
            packages/core/paged_attn.metallib
  test:
    name: ${{ matrix.test }}
    # Unit/integration tests don't depend on the label; skip the redundant re-run
    # a `labeled` event would otherwise spawn (build artifacts are unchanged).
    if: github.event.action != 'labeled'
    runs-on: macos-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        test:
          - 'yarn build:ts && yarn test'
          - 'cargo test'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin
          cache: false
          rustflags: ''

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          # Don't cache ~/.cargo/bin — restoring it overwrites the
          # rustup proxy installed by setup-rust-toolchain and leaves
          # cargo resolving to rustup-init's usage screen.
          cache-bin: false
          # Bumped after switching toolchain action; forces fresh
          # caches and orphans the poisoned v0-rust archives.
          prefix-key: v1-rust

      - name: Configure GitHub token for CMake downloads
        run: |
          echo "machine github.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          echo "machine objects.githubusercontent.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          chmod 600 ~/.netrc

      - name: Install dependencies
        run: yarn install --immutable

      - uses: actions/download-artifact@v7
        with:
          name: mlx-node
          path: packages/core/
      - uses: actions/download-artifact@v7
        with:
          name: mlx-metallib
          path: packages/core/
      - name: Run tests
        run: |
          yarn mlx download model --output .cache/models/qwen3-0.6b
          yarn mlx convert --input .cache/models/qwen3-0.6b -d bf16 --output .cache/models/qwen3-0.6b-mlx-bf16
          yarn mlx download dataset
          ${{ matrix.test }}
        env:
          RUST_BACKTRACE: 1
          CARGO_INCREMENTAL: 1
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}

  # Heavy real-model end-to-end leg — reuses the `build` job's native addon +
  # metallib artifacts (no second native build). Each matrix leg downloads +
  # converts the SMALLEST checkpoint for one model family, then runs that
  # family's #[ignore]'d, self-referential tests (paged==flat byte parity,
  # reset/replay determinism, session warm-reuse, greedy MTP==AR). They assert
  # WITHIN a single run, so they need no host-specific golden and stay CI-robust.
  #
  # Runs on push-to-main + dispatch (release gate; publish `needs` it) AND on PRs
  # carrying the `model-e2e` label — opting in on the label add and re-running on
  # every later commit while the label is present. The PR opt-in reuses the
  # `build` artifacts (no native rebuild; see the build job's reuse step).
  #
  # Excluded family: qwen3_5 MoE — smallest published checkpoint is 35B-A3B
  # (~70GB), no small option, won't fit a standard macOS runner's RAM. The gemma4
  # QAT (wNa8o8) leg (~2.9GB) runs on PR opt-in but is SKIPPED on the push/release
  # gate (its run step early-exits) until CI's HUGGINGFACE_TOKEN is confirmed to
  # reach the gated google/gemma-4-E2B-it-qat-mobile-transformers repo — otherwise
  # a download failure would block releases.
  model-test:
    name: e2e ${{ matrix.name }}
    needs: build
    # push-to-main and manual dispatch always run. For PRs: a `labeled` event
    # runs ONLY when the just-added label is `model-e2e` (github.event.label.name)
    # — so unrelated label churn on an already-labeled PR is a no-op; a later
    # `synchronize` keeps re-running while the PR still carries the label
    # (full-set contains, gated to non-label actions).
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'model-e2e' ||
      (github.event.action != 'labeled' &&
       contains(github.event.pull_request.labels.*.name, 'model-e2e'))
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: qwen3
            model: Qwen/Qwen3-0.6B
            slug: qwen3-0.6b
            mtype: ''
            kind: cargo
            env: MLX_TEST_MODEL_PATH
            tests: --test qwen3_paged_vs_flat_parity
          - name: qwen3_5-dense
            model: Qwen/Qwen3.5-0.8B
            slug: qwen3.5-0.8b
            mtype: qwen3_5
            kind: cargo
            env: MLX_TEST_MODEL_PATH
            tests: >-
              --test qwen3_5_paged_vs_flat_parity
              --test qwen3_5_session
              --test qwen3_5_delta_chat
              --test p2_paged_thinking_honors_enable
          - name: lfm2
            model: LiquidAI/LFM2.5-1.2B-Thinking
            slug: lfm2.5-1.2b-thinking
            mtype: lfm2
            kind: cargo
            env: MLX_TEST_MODEL_PATH MLX_TEST_LFM2_MODEL_PATH
            tests: >-
              --test lfm2_paged_vs_flat_parity
              --test lfm2_session
          # gemma4 QAT (wNa8o8): convert the prequantized source and run the
          # single-instance TS e2e coherence test (text + vision on examples/ocr.png).
          # PR-opt-in only — the run step skips it on the push/release gate.
          - name: gemma4
            model: google/gemma-4-E2B-it-qat-mobile-transformers
            slug: gemma-4-e2b-qat
            mtype: gemma4
            kind: ts
            env: ''
            tests: __test__/models/gemma4-qat-e2e.test.ts
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin
          cache: false
          rustflags: ''

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          prefix-key: v1-rust

      - name: Configure GitHub token for CMake downloads
        run: |
          echo "machine github.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          echo "machine objects.githubusercontent.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          chmod 600 ~/.netrc

      - name: Install dependencies
        run: yarn install --immutable

      - uses: actions/download-artifact@v7
        with:
          name: mlx-node
          path: packages/core/
      - uses: actions/download-artifact@v7
        with:
          name: mlx-metallib
          path: packages/core/

      - name: Download + convert ${{ matrix.name }} checkpoint and run its tests
        env:
          RUST_BACKTRACE: 1
          CARGO_INCREMENTAL: 1
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: |
          set -euo pipefail
          # The gemma4 QAT leg pulls a GATED HF repo; until CI's token is confirmed
          # to reach it, run it on the PR opt-in path ONLY — skip on push AND
          # workflow_dispatch (both release-gate paths) so a download failure can't
          # block releases.
          if [ "${{ matrix.name }}" = "gemma4" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "::notice::Skipping gemma4 QAT leg on ${{ github.event_name }} (PR opt-in only; gated HF repo)."
            exit 0
          fi
          src=".cache/models/${{ matrix.slug }}"
          out=".cache/models/${{ matrix.slug }}-mlx-bf16"
          yarn mlx download model -m "${{ matrix.model }}" --output "$src"
          if [ -n "${{ matrix.mtype }}" ]; then
            yarn mlx convert --input "$src" -d bf16 -m "${{ matrix.mtype }}" --output "$out"
          else
            yarn mlx convert --input "$src" -d bf16 --output "$out"
          fi
          ckpt="$PWD/$out"
          if [ "${{ matrix.kind }}" = "ts" ]; then
            # TS e2e leg (gemma4 QAT): point the presence gate at the converted
            # checkpoint and run the single test file through Vitest.
            yarn build:ts
            GEMMA4_QAT_MODEL_PATH="$ckpt" yarn test ${{ matrix.tests }}
          else
            # cargo leg: point this family's gating env var(s) at the converted
            # checkpoint so the #[ignore]'d tests un-skip; `-- --ignored` runs only those.
            for v in ${{ matrix.env }}; do export "$v=$ckpt"; done
            cargo test -p mlx-core ${{ matrix.tests }} -- --ignored --nocapture
          fi

  lint:
    name: Rust Lint
    # Lint doesn't depend on the label; skip the redundant re-run a `labeled`
    # event would otherwise spawn.
    if: github.event.action != 'labeled'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
          target: aarch64-apple-darwin
          cache: false
          rustflags: ''

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          # Don't cache ~/.cargo/bin — restoring it overwrites the
          # rustup proxy installed by setup-rust-toolchain and leaves
          # cargo resolving to rustup-init's usage screen.
          cache-bin: false
          # Bumped after switching toolchain action; forces fresh
          # caches and orphans the poisoned v0-rust archives.
          prefix-key: v1-rust

      - name: Configure GitHub token for CMake downloads
        run: |
          echo "machine github.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          echo "machine objects.githubusercontent.com login x-access-token password ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc
          chmod 600 ~/.netrc

      - name: Install dependencies
        run: yarn install --immutable

      - name: TypeCheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        env:
          CARGO_INCREMENTAL: 1

  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    needs:
      - test
      - lint
      - model-test
    # Don't publish a release when the e2e model-test matrix fails. `always()`
    # keeps publish running when model-test is SKIPPED (on PRs without the
    # `model-e2e` label) instead of cascading the skip onto publish; test + lint
    # must still have succeeded.
    if: >-
      always() &&
      needs.test.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.model-test.result != 'failure' &&
      needs.model-test.result != 'cancelled'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build TypeScript
        run: yarn build:ts

      - uses: actions/download-artifact@v7
        with:
          name: mlx-node
          path: packages/core/artifacts
      - uses: actions/download-artifact@v7
        with:
          name: mlx-metallib
          path: packages/core/npm/darwin-arm64/
      - name: move artifacts
        run: yarn workspace @mlx-node/core napi artifacts
      - name: List dir
        run: ls -R packages/core
      - name: Publish package
        run: |
          npm install -g npm
          if git log -1 --pretty=%B | grep "^[0-9]\+\.[0-9]\+\.[0-9]\+$";
          then
            yarn workspaces foreach -Rt --no-private npm publish --access public --tolerate-republish
          elif git log -1 --pretty=%B | grep "^[0-9]\+\.[0-9]\+\.[0-9]\+";
          then
            yarn workspaces foreach -Rt --no-private npm publish --access public --tag next --tolerate-republish 
          else
            echo "Not a release, skipping publish"
          fi
