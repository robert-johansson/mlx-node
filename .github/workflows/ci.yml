name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '1'

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build native module
        run: yarn build

      - uses: actions/upload-artifact@v6
        with:
          name: mlx-node
          path: packages/core/*.node
      - uses: actions/upload-artifact@v6
        with:
          name: mlx-metallib
          path: packages/core/mlx.metallib
  test:
    name: ${{ matrix.test }}
    runs-on: macos-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        test:
          - 'yarn build:ts && yarn test'
          - 'cargo test'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: yarn install --immutable

      - uses: actions/download-artifact@v7
        with:
          name: mlx-node
          path: packages/core/
      - uses: actions/download-artifact@v7
        with:
          name: mlx-metallib
          path: packages/core/
      - name: Run tests
        run: |
          yarn oxnode ./scripts/download-model.ts
          yarn oxnode ./scripts/convert-model.ts --input .cache/models/qwen3-0.6b -d bf16 --output .cache/models/qwen3-0.6b-mlx-bf16
          yarn download:gsm8k
          ${{ matrix.test }}
        env:
          RUST_BACKTRACE: 1

  lint:
    name: Rust Lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Install dependencies
        run: yarn install --immutable

      - name: TypeCheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - test
      - lint
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - uses: actions/download-artifact@v7
        with:
          name: mlx-node
          path: packages/core/artifacts
      - uses: actions/download-artifact@v7
        with:
          name: mlx-metallib
          path: packages/core/npm/darwin-arm64/
      - name: move artifacts
        run: yarn workspace @mlx-node/core napi artifacts
      - name: List dir
        run: ls -R packages/core
      - name: Publish package
        run: |
          npm install -g npm
          if git log -1 --pretty=%B | grep "^[0-9]\+\.[0-9]\+\.[0-9]\+$";
          then
            yarn workspaces foreach -Rt --no-private npm publish --access public --tolerate-republish
          elif git log -1 --pretty=%B | grep "^[0-9]\+\.[0-9]\+\.[0-9]\+";
          then
            yarn workspaces foreach -Rt --no-private npm publish --access public --tag next --tolerate-republish 
          else
            echo "Not a release, skipping publish"
          fi
